<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — VoteSmart India</title>
  <link rel="stylesheet" href="../css/global.css" />
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2.5rem; width:100%; max-width:460px; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-title { font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700; text-align:center; margin-bottom:0.4rem; }
    .auth-sub { text-align:center; font-size:0.82rem; color:var(--muted); margin-bottom:2rem; }
    .form-row2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .auth-submit { width:100%; margin-top:0.5rem; }
    .auth-footer { text-align:center; font-size:0.82rem; color:var(--muted); margin-top:1.5rem; }
    .auth-footer a { color:#B08AE0; }
    .divider { display:flex; align-items:center; gap:1rem; margin:1.5rem 0; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .divider span { font-size:0.75rem; color:var(--muted); }
    .btn-google { width:100%; padding:12px; border-radius:var(--radius); font-size:0.9rem; font-weight:500; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
    .btn-google:hover { border-color:var(--p); }
    .alert { padding:10px 14px; border-radius:var(--radius); font-size:0.82rem; margin-bottom:1rem; display:none; }
    .alert-error { background:rgba(225,29,72,0.1); border:1px solid rgba(225,29,72,0.3); color:#F87171; }
    .alert-success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#22C55E; }
    .role-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; margin-bottom:1.2rem; }
    .role-card { border:1px solid var(--border); border-radius:var(--radius); padding:1rem; cursor:pointer; transition:all 0.2s; text-align:center; }
    .role-card:hover { border-color:var(--p); }
    .role-card.selected { border-color:var(--p); background:rgba(106,13,173,0.15); }
    .role-card .ri { font-size:1.5rem; margin-bottom:4px; }
    .role-card .rn { font-family:'Rajdhani',sans-serif; font-size:0.9rem; font-weight:700; }
    .role-card .rd { font-size:0.72rem; color:var(--muted); }
    label.rlabel { font-size:0.8rem; color:var(--muted); display:block; margin-bottom:0.6rem; font-weight:500; letter-spacing:0.5px; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a class="logo" href="../index.html" style="justify-content:center">
        <div class="logo-icon">🗳</div>
        VoteSmart <span>India</span>
      </a>
    </div>
    <h1 class="auth-title">Create Your Account</h1>
    <p class="auth-sub">Join India's leading election education platform.</p>

    <div class="alert alert-error" id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>

    <label class="rlabel">I am a...</label>
    <div class="role-grid" id="roleGrid">
      <div class="role-card selected" data-role="student" onclick="selectRole(this)">
        <div class="ri">🎓</div>
        <div class="rn">Student</div>
        <div class="rd">Individual learner</div>
      </div>
      <div class="role-card" data-role="institution" onclick="selectRole(this)">
        <div class="ri">🏫</div>
        <div class="rn">Institution</div>
        <div class="rd">College / NGO / Org</div>
      </div>
    </div>

    <div class="form-row2">
      <div class="form-group"><label>First Name</label><input type="text" id="firstName" placeholder="Raj" /></div>
      <div class="form-group"><label>Last Name</label><input type="text" id="lastName" placeholder="Patel" /></div>
    </div>
    <div class="form-group"><label>Email Address</label><input type="email" id="regEmail" placeholder="you@example.com" /></div>
    <div class="form-group" id="institutionField" style="display:none">
      <label>Institution / Organization Name</label>
      <input type="text" id="institutionName" placeholder="e.g. SVNIT Surat" />
    </div>
    <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Min. 6 characters" /></div>

    <button class="btn-primary auth-submit" onclick="doRegister()">Create Account →</button>

    <div class="divider"><span>or</span></div>
    <button class="btn-google" onclick="googleReg()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>
<script src="../js/global.js"></script>
<script>
let selectedRole = 'student';
function selectRole(el) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedRole = el.dataset.role;
  document.getElementById('institutionField').style.display = selectedRole === 'institution' ? 'block' : 'none';
}
function doRegister() {
  const fn = document.getElementById('firstName').value.trim();
  const ln = document.getElementById('lastName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const err = document.getElementById('errorMsg');
  const succ = document.getElementById('successMsg');
  err.style.display = 'none';
  if (!fn || !ln || !email || !pass) { err.textContent = 'Please fill all required fields.'; err.style.display='block'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display='block'; return; }
  AuthState.set({ name: fn + ' ' + ln, email, role: selectedRole });
  succ.textContent = 'Account created! Redirecting to dashboard…';
  succ.style.display = 'block';
  setTimeout(() => window.location.href = 'dashboard.html', 1200);
}
function googleReg() {
  AuthState.set({ name: 'Google User', email: 'google@demo.com', role: 'student' });
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
